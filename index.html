<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XFiT</title>
<style>
  :root { --navy:#0E1F4A; --navy2:#153783; --accent:#F2641E; --ink:#1b2430; --muted:#5b6675; --line:#e6e9ef; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; color:#fff;
         background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1f3369 100%);
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","IBM Plex Sans Arabic","Tajawal","Noto Sans Arabic",sans-serif;
         display:flex; align-items:center; justify-content:center; padding:24px; }
  .box { max-width:460px; width:100%; text-align:center; }
  .mark { width:84px; height:84px; border-radius:22px; background:rgba(255,255,255,.14);
          display:flex; align-items:center; justify-content:center; font-size:42px; margin:0 auto 22px; }
  h1 { font-size:40px; font-weight:800; letter-spacing:3px; margin:0 0 8px; }
  .tag { opacity:.85; font-size:16px; margin:0 0 34px; }
  .links { display:flex; flex-direction:column; gap:12px; }
  .links a { display:block; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);
             color:#fff; text-decoration:none; font-weight:700; font-size:16px; padding:16px; border-radius:16px;
             transition:background .15s; }
  .links a:hover { background:rgba(255,255,255,.18); }
  .mailto { color:#fff; font-weight:700; }
  .foot { margin-top:30px; opacity:.7; font-size:13px; }
</style>
</head>
<body>
  <div class="box">
    <div class="mark">🏋️</div>
    <h1>XFiT</h1>
    <p class="tag">تطبيق لياقة حبال المقاومة — تدرّب أينما كنت.</p>
    <div class="links">
      <a href="privacy.html">سياسة الخصوصية</a>
      <a href="support.html">الدعم والمساعدة</a>
      <a class="mailto" href="mailto:xfit4dev@gmail.com">✉️ تواصل: xfit4dev@gmail.com</a>
    </div>
    <p class="foot">© 2026 XFiT — جميع الحقوق محفوظة</p>
  </div>
</body>
</html>
